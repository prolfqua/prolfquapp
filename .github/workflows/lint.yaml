# Runs lintr::lint_package() on push and pull_request.
# LINTR_ERROR_ON_LINT makes any lint fail the build, mirroring the local
# `make lint` gate. This package is lint-clean, so lint is a hard gate here.
name: lint

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::lintr, local::.
          needs: lint

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true
