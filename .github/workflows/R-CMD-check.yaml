# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Runs R CMD check (which runs the testthat suite) on pushes to master and on
# pull requests, so changes are validated before they land upstream.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: macos-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

      - name: Run goodpractice report
        if: ${{ always() && runner.os == 'Linux' }}
        continue-on-error: true
        run: |
          mkdir -p goodpractice-report
          Rscript -e 'result <- goodpractice::gp("."); print(result); saveRDS(result, "goodpractice-report/result.rds")' \
            > goodpractice-report/report.txt 2>&1

      - name: Upload goodpractice report
        if: ${{ always() && runner.os == 'Linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: goodpractice-${{ runner.os }}-R-${{ matrix.config.r }}
          path: goodpractice-report
          if-no-files-found: warn
