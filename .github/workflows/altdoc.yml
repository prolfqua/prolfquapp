name: altdoc

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  altdoc:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::altdoc
            github::fgcz/prolfqua
          needs: website

      - name: Verify FGCZ Quarto assets are synchronized
        run: |
          Rscript --vanilla data-raw/sync_quarto_assets.R
          if [ -n "$(git status --porcelain -- vignettes/_metadata.yml vignettes/fgcz.scss vignettes/fgcz_header_quarto.html vignettes/fgcz-plot-finder.html)" ]; then
            echo "::error::FGCZ Quarto assets are out of sync — run make sync-quarto-assets and commit"
            git --no-pager diff -- vignettes/_metadata.yml vignettes/fgcz.scss vignettes/fgcz_header_quarto.html vignettes/fgcz-plot-finder.html
            exit 1
          fi

      # altdoc renders the report vignettes, which call prolfquapp::example_*();
      # install the package first so those functions are available.
      - name: Install package
        run: R CMD INSTALL .

      - name: Build docs with altdoc
        run: Rscript -e 'altdoc::render_docs(freeze = FALSE)'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true
