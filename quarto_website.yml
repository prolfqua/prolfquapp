project:
  type: website
  output-dir: ../docs/

# Note: freeze functionality can be set at a project level or for individual .qmd files
# execute:
#   freeze: false

website:
  title: "$ALTDOC_PACKAGE_NAME"
  repo-url: $ALTDOC_PACKAGE_URL_GITHUB
  repo-branch: master
  repo-actions: [source]
  navbar:
    search: true
    right:
      - icon: github
        href: $ALTDOC_PACKAGE_URL_GITHUB
        aria-label: $ALTDOC_PACKAGE_NAME GitHub
  sidebar:
    collapse-level: 1
    contents:
      - text: Home
        file: index.md
      - section: Articles
        contents:
          - vignettes/Grp2Analysis_V2_R6.qmd
          - vignettes/DiffExpQC_R6_tabset.qmd
          - vignettes/Grp2Analysis_V2_SE_tabset.qmd
          - vignettes/QC_ProteinAbundances_tabset.qmd
          - vignettes/QCandSSE_tabset.qmd
          - vignettes/Auxiliary_ExDesignSurvey.Rmd
      - section: $ALTDOC_MAN_BLOCK
      - text: News
        file: $ALTDOC_NEWS
      - text: Changelog
        file: $ALTDOC_CHANGELOG
      - text: License
        file: $ALTDOC_LICENSE
      - text: Licence
        file: $ALTDOC_LICENCE
      - text: Code of conduct
        file: $ALTDOC_CODE_OF_CONDUCT
      - text: Citation
        file: $ALTDOC_CITATION

format:
  html:
    code-link: true
#     theme: cosmo
#     number-sections: false
